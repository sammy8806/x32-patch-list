<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>V3 · Command — X32 Patch List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: #ffffff;
        --foreground: #09090b;
        --muted: #f4f4f5;
        --muted-foreground: #71717a;
        --border: #e4e4e7;
        --ring: #18181b;
        --primary: #18181b;
        --primary-foreground: #fafafa;
        --success: #16a34a;
        --radius: 0.75rem;
        --font-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      body {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 2rem 1rem;
        gap: 1.5rem;
        /* very faint grid */
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 48px 48px;
        background-position: center center;
        background-color: var(--background);
        position: relative;
      }
      body::after {
        /* fade the grid to nothing at the edges */
        content: "";
        position: fixed; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 0%, var(--background) 75%);
      }
      main { position: relative; z-index: 1; width: 100%; max-width: 620px; }
      .crumb {
        display: flex; align-items: center; gap: 0.5rem;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--muted-foreground);
        margin-bottom: 1rem;
      }
      .crumb .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--success);
      }
      .crumb span:last-child { color: var(--foreground); }
      h1 {
        margin: 0 0 0.3rem;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .lede {
        margin: 0 0 1.4rem;
        color: var(--muted-foreground);
        font-size: 0.9rem;
      }
      /* Command component */
      .cmd {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--background);
        overflow: hidden;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.03),
          0 10px 30px -10px rgba(0, 0, 0, 0.08);
        transition: box-shadow 180ms, border-color 180ms;
      }
      .cmd:focus-within, .cmd.drag {
        border-color: var(--ring);
        box-shadow:
          0 0 0 4px rgba(24, 24, 27, 0.05),
          0 1px 2px rgba(0, 0, 0, 0.03),
          0 14px 40px -10px rgba(0, 0, 0, 0.1);
      }
      .cmd-input {
        display: flex; align-items: center; gap: 0.7rem;
        padding: 0.95rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      .cmd-input svg { color: var(--muted-foreground); flex: none; }
      .cmd-input .placeholder {
        flex: 1;
        font-size: 0.95rem;
        color: var(--muted-foreground);
        font-family: var(--font-mono);
        letter-spacing: -0.01em;
      }
      .kbd {
        display: inline-flex; align-items: center;
        padding: 0.1rem 0.4rem;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--muted-foreground);
        background: var(--muted);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      .cmd-group {
        padding: 0.5rem;
      }
      .cmd-label {
        padding: 0.45rem 0.65rem 0.3rem;
        font-size: 0.7rem;
        color: var(--muted-foreground);
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .cmd-item {
        display: flex; align-items: center; gap: 0.7rem;
        padding: 0.55rem 0.65rem;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        color: var(--foreground);
      }
      .cmd-item .ico {
        width: 18px; height: 18px; color: var(--muted-foreground);
        flex: none;
      }
      .cmd-item .hint {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--muted-foreground);
      }
      .cmd-item:hover,
      .cmd-item.active {
        background: var(--muted);
      }
      .cmd-item.active .ico { color: var(--foreground); }
      .cmd-sep {
        height: 1px;
        background: var(--border);
        margin: 0.25rem 0;
      }
      .cmd-footer {
        display: flex; justify-content: space-between; align-items: center;
        padding: 0.55rem 0.8rem;
        border-top: 1px solid var(--border);
        background: var(--muted);
        font-size: 0.72rem;
        color: var(--muted-foreground);
      }
      .cmd-footer .keys { display: flex; gap: 0.9rem; align-items: center; }
      .cmd-footer .keys span { display: inline-flex; align-items: center; gap: 0.3rem; }
      input[type="file"] { display: none; }
      .hint-row {
        margin-top: 1.25rem;
        text-align: center;
        color: var(--muted-foreground);
        font-size: 0.78rem;
      }
      .hint-row b { color: var(--foreground); font-weight: 500; }
    </style>
  </head>
  <body>
    <main>
      <div class="crumb">
        <span class="dot" aria-hidden="true"></span>
        <span>X32 Patch List</span>
        <span>/</span>
        <span>new</span>
      </div>

      <h1>Open a scene file</h1>
      <p class="lede">Drop a <code>.scn</code> anywhere on this panel, or pick an action below.</p>

      <label class="cmd" id="cmd">
        <div class="cmd-input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <span class="placeholder">Drop .scn file, or type a command&hellip;</span>
          <span class="kbd">⌘K</span>
        </div>

        <div class="cmd-group">
          <div class="cmd-label">Actions</div>

          <div class="cmd-item active"
            onclick="document.getElementById('picker').click()">
            <svg class="ico" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
              <path d="M14 2v6h6"/>
            </svg>
            Open scene file from disk
            <span class="hint">Enter</span>
          </div>

          <div class="cmd-item">
            <svg class="ico" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <path d="M9 9h6v6H9z"/>
            </svg>
            Paste scene contents
            <span class="hint">⌘V</span>
          </div>

          <div class="cmd-item">
            <svg class="ico" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20"/><path d="m5 9 7-7 7 7"/>
            </svg>
            Try a bundled sample
            <span class="hint">T</span>
          </div>

          <div class="cmd-sep"></div>
          <div class="cmd-label">Recent</div>

          <div class="cmd-item">
            <svg class="ico" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            sunday-service.scn
            <span class="hint">14.3 kB</span>
          </div>
        </div>

        <input type="file" accept=".scn,text/plain" id="picker" />

        <div class="cmd-footer">
          <span>Runs locally &middot; nothing is uploaded</span>
          <span class="keys">
            <span><span class="kbd">↑</span><span class="kbd">↓</span> navigate</span>
            <span><span class="kbd">↵</span> select</span>
            <span><span class="kbd">esc</span> clear</span>
          </span>
        </div>
      </label>

      <div class="hint-row">
        Tip &mdash; press <b>⌘K</b> any time to return to this panel.
      </div>
    </main>

    <script>
      const cmd = document.getElementById("cmd");
      cmd.addEventListener("dragover", (e) => { e.preventDefault(); cmd.classList.add("drag"); });
      cmd.addEventListener("dragleave", () => cmd.classList.remove("drag"));
      cmd.addEventListener("drop", (e) => { e.preventDefault(); cmd.classList.remove("drag"); });
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
          e.preventDefault();
          document.getElementById("picker").click();
        }
      });
    </script>
  </body>
</html>
